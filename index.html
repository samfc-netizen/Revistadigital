<script>
  const articles = [
    {
      number: 'Artigo 01',
      category: 'Gestão e vendas',
      title: 'Follow up: disciplina simples que acelera vendas, gestão e execução',
      summary: 'O primeiro artigo da Executiva aborda o conceito de follow up, sua aplicação prática e por que ele se tornou uma rotina decisiva para negócios que querem avançar com método.',
      link: 'artigo-01.html'
    },
    {
      number: 'Artigo 02',
      category: 'Estrutura empresarial',
      title: 'Organograma: em tempos de IA, o maior ativo são pessoas',
      summary: 'O segundo artigo da Executiva aborda o papel do organograma na estrutura empresarial, destacando como a organização de pessoas e responsabilidades se torna ainda mais estratégica em tempos de IA.',
      link: 'artigo-02.html'
    },
    {
      number: 'Artigo 03',
      category: 'Indicadores',
      title: 'Vamos falar sobre Indicadores?',
      summary: 'Indicadores, gestão por resultados e os números que direcionam empresas de alta performance.',
      link: 'artigo-03.html'
    },

    /* ===== ESPAÇOS FUTUROS ===== */

    {
      number: 'Artigo 04',
      category: 'Em breve',
      title: 'Novo artigo em produção',
      summary: 'Conteúdo em desenvolvimento.',
      link: 'artigo-04.html'
    },

    {
      number: 'Artigo 05',
      category: 'Em breve',
      title: 'Novo artigo em produção',
      summary: 'Conteúdo em desenvolvimento.',
      link: 'artigo-05.html'
    },

    {
      number: 'Artigo 06',
      category: 'Em breve',
      title: 'Novo artigo em produção',
      summary: 'Conteúdo em desenvolvimento.',
      link: 'artigo-06.html'
    }
  ];

  async function fileExists(url) {
    try {
      const response = await fetch(url, { method: 'HEAD' });
      return response.ok;
    } catch {
      return false;
    }
  }

  async function renderArticles() {
    const visibleArticles = [];

    for (const article of articles) {
      const exists = await fileExists(article.link);

      if (exists) {
        visibleArticles.push(article);
      }
    }

    document.getElementById('menu-list').innerHTML =
      visibleArticles.map(article => `
        <a class="menu-link" href="${article.link}">
          <span>${article.number} — ${article.title}</span>
          <span>→</span>
        </a>
      `).join('');

    document.getElementById('articles-grid').innerHTML =
      visibleArticles.map(article => `
        <article class="article-card">
          <div class="article-cover">
            <span class="article-number">${article.number}</span>
          </div>

          <div class="article-body">
            <div class="card-tag">${article.category}</div>

            <h3>${article.title}</h3>

            <p>${article.summary}</p>

            <a class="article-link" href="${article.link}">
              Ler artigo <span>→</span>
            </a>
          </div>
        </article>
      `).join('');
  }

  renderArticles();
</script>
